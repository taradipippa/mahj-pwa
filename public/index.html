<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mahjong IQ">
<meta name="theme-color" content="#1F2A36">
<title>Mahjong IQ — Hand Analyzer</title>
<link rel="manifest" href="/manifest.json?v=2">
<link rel="apple-touch-icon" href="/icon-192.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bone:#F4F5F7;
  --bone2:#ECEFF2;
  --ink:#1F2A36;
  --ink2:#4B5563;
  --ink3:#6B7280;
  --gold:#B89A5B;
  --gold2:#C9AE7A;
  --red:#b82010;
  --green:#1a6020;
  --blue:#1F2A36;
  --bam:#2a6020;
  --crk:#b82010;
  --dot:#1a3060;
  --navy:#1F2A36;
  --navy-hover:#2F3A45;
  --shadow:0 2px 8px rgba(31,42,54,0.12);
  --r:10px;
  --r-sm:6px;
}
html,body{height:100%;background:var(--bone);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:17px;line-height:1.5;overflow-x:hidden}
html{scroll-padding-top:120px}
body{padding-top:env(safe-area-inset-top)}
#updateBanner{position:fixed;top:0;left:0;right:0;z-index:9999;background:#1F2A36;color:#fff;text-align:center;padding:18px 24px;padding-top:calc(18px + env(safe-area-inset-top));font-size:16px;font-weight:500;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(31,42,54,0.35);display:flex;align-items:center;justify-content:center;gap:12px}
#updateBanner .update-btn{background:#B89A5B;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;white-space:nowrap}
#updateBanner .update-btn:active{opacity:.85}

/* ── SCREENS ─────────────────────────────────────── */
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* ── HEADER ─────────────────────────────────────── */
.app-header{background:var(--navy);color:#fff;padding:10px 14px 8px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:10px}
.app-title{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.2px;color:#fff;line-height:1.2}
.app-byline{font-size:11px;color:var(--gold2);letter-spacing:.3px;margin-top:1px;font-weight:400}
.app-icon{width:32px;height:32px;flex-shrink:0}
.tile-counter{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;font-size:15px;font-weight:600;min-width:54px;text-align:center;transition:all .2s}
.tile-counter.ready{background:var(--gold);color:var(--ink)}

/* ── SELECTED TILE STRIP ─────────────────────────── */
.tile-strip-wrap{background:var(--bone2);border-bottom:1px solid #d4c89a;padding:7px 10px 6px;min-height:44px;position:sticky;top:64px;z-index:90}
.tile-strip{display:flex;flex-wrap:wrap;gap:4px;min-height:28px;align-items:center}
.strip-empty{font-size:14px;color:var(--ink3);font-style:italic}
.tile-chip{display:inline-flex;align-items:center;gap:3px;padding:3px 7px 3px 8px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;background:#E8ECF0;color:var(--ink);border:1px solid #C5CDD6;user-select:none;-webkit-tap-highlight-color:transparent}
.tile-chip:active{opacity:.7}
.tile-chip.bam{background:#d4eecc;border-color:#a8d4a0;color:var(--bam)}
.tile-chip.crk{background:#fde0dc;border-color:#f4b8b0;color:var(--crk)}
.tile-chip.dot{background:#d8e8f8;border-color:#a8c8e8;color:var(--dot)}
.tile-chip.wind{background:#e8e4f4;border-color:#c8c0e4;color:#3a2880}
.tile-chip.dragon,.tile-chip.flower,.tile-chip.joker{background:#f4ecd4;border-color:#d4b870;color:#6a4a10}
.chip-x{font-size:10px;opacity:.6;margin:1px}
.results-hand-strip{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px 8px;background:var(--bone2);border-bottom:1px solid #d4c89a;margin-bottom:14px;}


/* ── TILE GRID ───────────────────────────────────── */
.select-body{padding:20px 8px 80px}
.suit-section{margin-bottom:7px}
.suit-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;padding:1px}
.tile-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px}
.tile-grid.wind-grid{grid-template-columns:repeat(4,1fr)}
.tile-grid.dragon-grid{grid-template-columns:repeat(3,1fr)}
.tile-grid.extras-grid{grid-template-columns:repeat(2,1fr)}
.tile-btn{
  position:relative;
  background:#FFFFFF;
  border:1.5px solid #D1D9E0;
  border-radius:5px;
  text-align:center;
  cursor:pointer;
  min-height:52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
/* Selected: dark bg with clearly readable colored text — NOT black text on black */
.tile-btn.selected{background:#1F2A36;border-color:#B89A5B;}
.tile-btn.selected .tile-num{color:#f0d878}
.tile-btn.selected .tile-sub{color:rgba(240,216,120,.55)}
/* Suit number colors — unselected */
.tile-num{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;line-height:1;color:var(--ink)}
.tile-sub{font-size:10px;color:var(--ink3);margin-top:1px;letter-spacing:.2px}
.bam .tile-num{color:#1e6018}
.crk .tile-num{color:#b01808}
.dot .tile-num{color:#1430a0}
/* Selected suit colors — light on dark bg */
.tile-btn.selected.bam .tile-num{color:#7edc72}
.tile-btn.selected.crk .tile-num{color:#ff8878}
.tile-btn.selected.dot .tile-num{color:#82aaff}
.wind-btn .tile-num,.dragon-btn .tile-num{font-size:18px}
.flower-btn .tile-num,.joker-btn .tile-num{font-size:19px}
/* Count badge */
.count-badge{position:absolute;top:2px;right:2px;background:var(--gold);color:var(--ink);font-size:10px;font-weight:700;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;line-height:1}

/* ── ANALYZE BUTTON ──────────────────────────────── */
.analyze-bar{position:fixed;bottom:0;left:0;right:0;padding:7px 14px;padding-bottom:calc(7px + env(safe-area-inset-bottom));background:var(--bone);border-top:1px solid var(--bone2);z-index:50}
.analyze-btn{
  width:100%;background:#888;color:#ddd;border:none;border-radius:var(--r);
  padding:14px;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:600;
  letter-spacing:.3px;cursor:default;transition:background .2s,color .2s;
  pointer-events:none;
}
.analyze-btn.enabled{
  background:var(--navy);color:#fff;pointer-events:auto;cursor:pointer;
}
.analyze-btn.enabled:active{opacity:.88}
/* ── RESULTS SCREEN ──────────────────────────────── */
.results-header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.results-title{font-family:'Lora',serif;font-size:19px;font-weight:600}
.btn-edit,.btn-reset{background:rgba(255,255,255,.12);border:none;color:var(--bone);padding:7px 13px;border-radius:20px;font-size:15px;font-weight:500;cursor:pointer}
.btn-edit:active,.btn-reset:active{background:rgba(255,255,255,.22)}
.results-body{padding:14px 12px 40px}
/* ── EAST BANNER ─────────────────────────────────── */
.east-banner{background:var(--gold2);color:var(--ink);border-radius:var(--r);padding:11px 14px;font-size:15px;line-height:1.5;margin-bottom:14px}
/* ── SECTION FOCUS ───────────────────────────────── */
.section-focus{background:#fff;border:1px solid var(--bone2);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.sf-title{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.sf-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px}
.sf-row:last-child{margin-bottom:0}
.sf-rank{font-size:12px;font-weight:700;color:var(--ink3);min-width:16px;padding-top:1px}
.sf-name{font-weight:600;font-size:16px;color:var(--ink);line-height:1.2}
.sf-reason{font-size:14px;color:var(--ink2);margin-top:2px;line-height:1.4}
/* ── REC CARDS ───────────────────────────────────── */
.rec-card{background:#fff;border:1px solid #DDE2E8;border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(31,42,54,0.08)}
.rec-header{background:#fff;padding:14px 16px;cursor:pointer;user-select:none}
.rec-header:active{opacity:.85}
.rec-body{padding:0 16px 14px;transition:none}
.rec-body.collapsed{display:none}
.rec-toggle{font-size:13px;font-weight:600;color:var(--navy);background:var(--bone2);border:none;border-radius:20px;padding:5px 14px;cursor:pointer;white-space:nowrap;margin-left:auto;flex-shrink:0}
.rec-toggle:active{opacity:.8}
.rec-rank-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;width:100%}
.rec-rank-label{font-size:12px;font-weight:700;color:#fff;background:var(--navy);border-radius:4px;padding:2px 8px;letter-spacing:.5px}
.rec-sec-tag{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3)}
.conc-badge{font-size:10px;font-weight:600;color:var(--red);background:rgba(184,32,16,.1);border-radius:20px;padding:2px 7px;margin-left:auto}
.card-ref{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:3px}
.hand-display{font-family:'Courier New',monospace;font-size:15px;letter-spacing:.5px;margin:4px 0 3px;line-height:1.4}
.tiles-matched{font-size:13px;font-weight:600;color:var(--ink2)}
.pts-badge{font-size:11px;font-weight:600;color:var(--ink3);background:var(--bone2);border-radius:20px;padding:2px 8px}
.rec-body{padding:0 16px 14px}
.rec-section-head{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin:12px 0 6px}
.rec-field{font-size:15px;color:var(--ink2);margin-bottom:8px;line-height:1.5}
.rec-field:last-child{margin-bottom:0}
.rec-field strong{color:var(--ink);font-weight:600}
.need-list{line-height:2}
.need-row{display:flex;align-items:baseline;justify-content:space-between;font-size:14px;padding:5px 0;border-bottom:1px solid var(--bone2)}
.need-row:last-child{border-bottom:none}
.need-tile{color:var(--ink);font-weight:500}
.need-progress{color:var(--ink3);font-size:13px;margin:0 8px}
.need-status{font-size:12px;font-weight:700;border-radius:20px;padding:2px 10px;white-space:nowrap}
.status-callable{background:#E6F4EA;color:#1a6020}
.status-not-callable{background:#F0F2F5;color:var(--ink3)}
.joker-note{font-size:13px;color:var(--ink3);padding:8px 0 0;line-height:1.5}
/* Need tags */
.tag{display:inline-block;font-size:12px;font-weight:600;border-radius:20px;padding:1px 7px;margin:5px;vertical-align:middle;letter-spacing:.2px}
.tag-ready{background:rgba(26,96,32,.12);color:var(--green)}
.tag-joker{background:rgba(26,48,96,.12);color:var(--blue)}
.tag-build{background:rgba(196,160,64,.15);color:#8a6010}
.tag-draw{background:rgba(80,60,40,.1);color:#6a5030}
.rationale{font-size:14px;color:var(--ink2);line-height:1.5}
.rationale-bullets{margin:0;padding-left:0;list-style:none}
.rationale-bullets li{font-size:14px;color:var(--ink2);padding:3px 0;line-height:1.4}
.rationale-bullets li::before{content:"• ";color:var(--gold)}
.joker-note{font-size:13px;color:var(--ink3);line-height:1.5}
.concealed-note{font-size:13px;color:var(--ink2);background:var(--bone2);border-radius:6px;padding:7px 10px;margin-top:6px;line-height:1.5}
.dragon-warn{font-size:13px;color:var(--red);margin-top:6px;line-height:1.4}
/* ── DISCARD CARD ────────────────────────────────── */
.discard-card{background:var(--navy);color:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.discard-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px}
.discard-row{display:flex;align-items:baseline;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.discard-row:last-child{border-bottom:none}
.discard-tile{font-size:14px;font-weight:600;color:#fff}
.discard-reason{font-size:12px;color:rgba(255,255,255,.55)}
.discard-fallback{font-size:14px;color:rgba(255,255,255,.8);line-height:1.5}
.section-head{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin:16px 0 8px}
/* ── PIVOT CARDS ─────────────────────────────────── */
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3)}
.pivot-card{background:#fff;border:1px solid #DDE2E8;border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(31,42,54,0.06)}
.pivot-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pivot-ref{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:var(--ink)}
.pivot-score{font-size:13px;color:var(--ink3)}
.pivot-sec{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--blue);margin-bottom:5px}
.pivot-trig{font-size:15px;color:var(--ink2);line-height:1.4}
/* ── LOADING ─────────────────────────────────────── */
#loadingMsg{padding:40px 20px;text-align:center;color:var(--ink3);font-size:16px}
/* ── MISC ────────────────────────────────────────── */
.section-divider{height:1px;background:var(--bone2);margin:4px 0 14px}
.show-more-btn{width:100%;background:#fff;border:none;border-radius:var(--r);padding:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:12px;text-align:center;position:relative;box-shadow:0 0 0 1.5px #B89A5B,0 0 0 2.5px #E8D8A8,inset 0 1px 0 rgba(255,255,255,.8),0 2px 6px rgba(184,154,91,.25)}
.show-more-btn:active{opacity:.85;box-shadow:0 0 0 1.5px #9a7e44,0 0 0 2.5px #d4c080,inset 0 1px 0 rgba(255,255,255,.6)}
.next5-cards{margin-bottom:12px}
.n5-tile-count{font-size:12px;font-weight:600;color:var(--ink3);margin-bottom:4px}
.n5-chips-row{display:flex;flex-wrap:wrap;gap:3px}
.n5-card{background:#fff;border:1px solid var(--bone2);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.n5-header{background:#fff;padding:10px 14px;cursor:pointer}
.n5-header:active{opacity:.85}
.n5-rank-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.n5-ref{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--ink)}
.n5-chips{display:flex;flex-direction:column;gap:4px;margin-top:6px;padding-top:6px;border-top:1px solid var(--bone2)}
.n5-body{padding:12px 14px;display:none}
/* You Have chips */
.yhave-row{display:flex;flex-direction:column;gap:6px}
.yhave-chips{display:flex;flex-wrap:wrap;gap:3px}
.yhave-chips-header{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;padding-top:6px;border-top:1px solid var(--bone2)}
.yhave-chip{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:4px;font-size:13px;font-weight:600;background:#E8ECF0;color:var(--ink);border:1px solid #C5CDD6}
.yhave-chip.bam{background:#d4eecc;border-color:#a8d4a0;color:#1e6018}
.yhave-chip.crk{background:#fde0dc;border-color:#f4b8b0;color:#b01808}
.yhave-chip.dot{background:#d8e8f8;border-color:#a8c8e8;color:#1430a0}
.yhave-chip.wind,.yhave-chip.dragon,.yhave-chip.flower{background:#e8e4f4;border-color:#c8c0e4;color:#3a2880}
.yhave-chip.neutral{background:#f0e8d8;border-color:#d4c8a8;color:var(--ink2)}
/* Alt suit note */
.alt-suit-note{font-size:13px;color:var(--ink3);font-style:italic;margin-bottom:6px}
/* Scatter message */
.sf-scatter{font-style:italic;color:var(--ink3)}
</style>
</head>
<body>

<div id="updateBanner" style="display:none">
  <span>A new version of Mahjong IQ is available.</span>
  <button class="update-btn" onclick="window.location.reload()">Update Now</button>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- SELECT SCREEN                                   -->
<!-- ═══════════════════════════════════════════════ -->
<div id="selectScreen" class="screen active">

  <div class="app-header">
    <img src="/icon-192.png" class="app-icon" alt="Mahjong IQ" />
    <div style="flex:1">
      <div class="app-title">Mahjong Hand Analyzer</div>
      <div class="app-byline">by Mahjong IQ</div>
    </div>
    <div id="tileCounter" class="tile-counter">0 / 13</div>
  </div>

  <div class="tile-strip-wrap">
    <div id="tileStrip" class="tile-strip">
      <span class="strip-empty">Tap tiles to build your hand</span>
    </div>
  </div>

  <div class="select-body">

    <div class="suit-section">
      <div class="suit-label">Bam</div>
      <div class="tile-grid" id="bamGrid"></div>
    </div>

    <div class="suit-section">
      <div class="suit-label">Crack</div>
      <div class="tile-grid" id="crkGrid"></div>
    </div>

    <div class="suit-section">
      <div class="suit-label">Dot</div>
      <div class="tile-grid" id="dotGrid"></div>
    </div>

    <div class="suit-section">
      <div class="suit-label">Winds</div>
      <div class="tile-grid wind-grid" id="windGrid"></div>
    </div>

    <div class="suit-section">
      <div class="suit-label">Dragons</div>
      <div class="tile-grid dragon-grid" id="dragonGrid"></div>
    </div>

    <div class="suit-section">
      <div class="suit-label">Extras</div>
      <div class="tile-grid extras-grid" id="extrasGrid"></div>
    </div>

  </div>

  <div class="analyze-bar">
    <button id="analyzeBtn" class="analyze-btn" onclick="analyze()">Analyze Hand</button>
  </div>

</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- RESULTS SCREEN                                  -->
<!-- ═══════════════════════════════════════════════ -->
<div id="resultsScreen" class="screen">

  <div class="results-header">
    <div class="results-title">Your Hand</div>
    <div style="display:flex;gap:8px">
      <button class="btn-edit" onclick="editHand()">Edit</button>
      <button class="btn-reset" onclick="resetApp()">Reset</button>
    </div>
  </div>

  <div class="results-body">
    <div id="eastBanner"></div>
    <div id="loadingMsg">Analyzing...</div>
    <div id="resultsContent" style="display:none">
      <div id="sectionFocus"></div>
      <div id="top3Container"></div>
      <div id="next5Container"></div>
      <div id="discardCard"></div>
      <div id="pivotContainer"></div>
      <div id="glanceCard"></div>
    </div>
  </div>

</div>

<script>
// ============================================================
// MAHJ ADVISOR — 2026 NMJL CARD
// Complete logic: tile model, scoring engine, output renderer
// ============================================================

const SUITS = ['BAM','CRK','DOT'];
const MATCHING_DRAGON = { BAM:'GREEN', CRK:'RED', DOT:'WHITE' };
const OPPOSING_DRAGONS = { BAM:['RED','WHITE'], CRK:['GREEN','WHITE'], DOT:['GREEN','RED'] };
const COMPETITION_WEIGHT = {
  '1':1.40,'2':1.46,'3':1.60,'4':1.26,'5':1.54,
  '6':1.74,'7':1.33,'8':1.30,'9':1.64,
  'FLOWER':1.46,
  'NORTH':1.40,'SOUTH':1.40,'EAST':1.33,'WEST':1.33,
  'WHITE':1.47,'GREEN':1.25,'RED':1.25
};

// ============================================================
// TILE UI DEFINITIONS
// ============================================================

const TILE_DEFS = {
  bam: [1,2,3,4,5,6,7,8,9].map(n=>({id:`BAM_${n}`,label:`${n}`,sub:'Bam',suit:'BAM',type:'NUMBER',number:n,cls:'bam'})),
  crk: [1,2,3,4,5,6,7,8,9].map(n=>({id:`CRK_${n}`,label:`${n}`,sub:'Crack',suit:'CRK',type:'NUMBER',number:n,cls:'crk'})),
  dot: [1,2,3,4,5,6,7,8,9].map(n=>({id:`DOT_${n}`,label:`${n}`,sub:'Dot',suit:'DOT',type:'NUMBER',number:n,cls:'dot'})),
  winds:[
    {id:'NORTH',label:'N',sub:'North',type:'WIND',wind:'NORTH',cls:'wind-btn'},
    {id:'EAST', label:'E',sub:'East', type:'WIND',wind:'EAST', cls:'wind-btn'},
    {id:'WEST', label:'W',sub:'West', type:'WIND',wind:'WEST', cls:'wind-btn'},
    {id:'SOUTH',label:'S',sub:'South',type:'WIND',wind:'SOUTH',cls:'wind-btn'},
  ],
  dragons:[
    {id:'GREEN',label:'🟢',sub:'Green (Bam)',type:'DRAGON',dragon:'GREEN',cls:'dragon-btn'},
    {id:'RED',  label:'🔴',sub:'Red (Crack)',type:'DRAGON',dragon:'RED',  cls:'dragon-btn'},
    {id:'WHITE',label:'⬜',sub:'Soap (Dot)', type:'DRAGON',dragon:'WHITE',cls:'dragon-btn'},
  ],
  extras:[
    {id:'FLOWER',label:'🌸',sub:'Flower',type:'FLOWER',cls:'flower-btn'},
    {id:'JOKER', label:'★', sub:'Joker', type:'JOKER', cls:'joker-btn'},
  ]
};

const ALL_TILES = {};
[...TILE_DEFS.bam,...TILE_DEFS.crk,...TILE_DEFS.dot,
 ...TILE_DEFS.winds,...TILE_DEFS.dragons,...TILE_DEFS.extras
].forEach(t => ALL_TILES[t.id] = t);

const MAX_COPIES = {FLOWER:8,JOKER:8};
const getMax = id => MAX_COPIES[id] || 4;
const selectedTiles = {};

// ============================================================
// TILE SELECTION UI
// ============================================================

function buildGrid(containerId, tiles) {
  const container = document.getElementById(containerId);
  if (!container) return;
  tiles.forEach(tile => {
    const btn = document.createElement('div');
    btn.className = `tile-btn ${tile.cls}`;
    btn.id = `btn_${tile.id}`;
    btn.innerHTML = `<span class="tile-num">${tile.label}</span><span class="tile-sub">${tile.sub}</span>`;
    let _touchStartY = 0;
    btn.addEventListener('touchstart', (e) => { _touchStartY = e.touches[0].clientY; }, {passive:true});
    btn.addEventListener('touchend', (e) => {
      const moved = Math.abs(e.changedTouches[0].clientY - _touchStartY);
      if (moved < 8) { e.preventDefault(); toggleTile(tile.id); }
    });
    btn.addEventListener('click', () => toggleTile(tile.id));
    container.appendChild(btn);
  });
}

buildGrid('bamGrid',    TILE_DEFS.bam);
buildGrid('crkGrid',    TILE_DEFS.crk);
buildGrid('dotGrid',    TILE_DEFS.dot);
buildGrid('windGrid',   TILE_DEFS.winds);
buildGrid('dragonGrid', TILE_DEFS.dragons);
buildGrid('extrasGrid', TILE_DEFS.extras);

function getTotalCount() {
  return Object.values(selectedTiles).reduce((a,b)=>a+b,0);
}

function toggleTile(id) {
  const total   = getTotalCount();
  const current = selectedTiles[id] || 0;
  const max     = getMax(id);
  if (current >= max) {
    selectedTiles[id] = current - 1;
    if (selectedTiles[id] === 0) delete selectedTiles[id];
  } else if (total < 14) {
    selectedTiles[id] = current + 1;
  }
  updateUI();
}

function removeTile(id) {
  if (selectedTiles[id] > 0) {
    selectedTiles[id]--;
    if (selectedTiles[id] === 0) delete selectedTiles[id];
    updateUI();
  }
}

function updateUI() {
  const total = getTotalCount();
  const counter = document.getElementById('tileCounter');
  if (total === 13 || total === 14) {
    counter.className = 'tile-counter ready';
    counter.textContent = total === 14 ? '14 tiles — East' : '13 ✓ Ready';
  } else {
    counter.className = 'tile-counter';
    counter.textContent = `${total} / 13 tiles`;
  }
  Object.keys(ALL_TILES).forEach(id => {
    const btn = document.getElementById(`btn_${id}`);
    if (!btn) return;
    const count = selectedTiles[id] || 0;
    const tile  = ALL_TILES[id];
    const old   = btn.querySelector('.count-badge');
    if (old) old.remove();
    if (count > 0) {
      btn.classList.add('selected', tile.cls);
      const badge = document.createElement('div');
      badge.className = 'count-badge';
      badge.textContent = count;
      btn.appendChild(badge);
    } else {
      btn.classList.remove('selected');
    }
  });
  updateStrip();
  const btn = document.getElementById('analyzeBtn');
  if (!btn) return;
  if (total === 13 || total === 14) {
    btn.className = 'analyze-btn enabled';
    btn.textContent = total === 14 ? 'Analyze Hand (14 tiles — East)' : 'Analyze My Hand';
  } else {
    btn.className = 'analyze-btn';
    const n = 13 - total;
    btn.textContent = n === 1 ? 'Select 1 more tile' : `Select ${n} more tiles`;
  }
}

function updateStrip() {
  const strip = document.getElementById('tileStrip');
  if (!strip) return;
  strip.innerHTML = '';
  const total = getTotalCount();
  if (total === 0) {
    strip.innerHTML = '<span class="strip-empty">Tap tiles below to build your hand</span>';
    return;
  }
  const entries = [];
  ['BAM','CRK','DOT'].forEach(suit => {
    for (let n=1;n<=9;n++) {
      const id = `${suit}_${n}`;
      const c  = selectedTiles[id]||0;
      for (let i=0;i<c;i++) entries.push({id,tile:ALL_TILES[id],cls:suit.toLowerCase()});
    }
  });
  ['NORTH','EAST','WEST','SOUTH'].forEach(w => {
    const c = selectedTiles[w]||0;
    for (let i=0;i<c;i++) entries.push({id:w,tile:ALL_TILES[w],cls:'wind'});
  });
  ['GREEN','RED','WHITE'].forEach(d => {
    const c = selectedTiles[d]||0;
    for (let i=0;i<c;i++) entries.push({id:d,tile:ALL_TILES[d],cls:'dragon'});
  });
  ['FLOWER','JOKER'].forEach(id => {
    const c   = selectedTiles[id]||0;
    const cls = id==='FLOWER'?'flower':'joker';
    for (let i=0;i<c;i++) entries.push({id,tile:ALL_TILES[id],cls});
  });
  entries.forEach(({id,tile,cls}) => {
    const chip = document.createElement('div');
    chip.className = `tile-chip ${cls}`;
    let label = '';
    if      (tile.type==='NUMBER') label=`${tile.number}${tile.suit[0]}`;
    else if (tile.type==='WIND')   label=tile.wind[0];
    else if (tile.type==='DRAGON') label=tile.dragon==='WHITE'?'Soap':tile.dragon[0]+'D';
    else if (tile.type==='FLOWER') label='🌸';
    else if (tile.type==='JOKER')  label='★';
    chip.innerHTML = `${label}<span class="chip-x">✕</span>`;
    chip.onclick = () => removeTile(id);
    strip.appendChild(chip);
  });
}

// ============================================================
// HAND ANALYSIS
// ============================================================

function analyzeHand() {
  const tiles    = [];
  Object.entries(selectedTiles).forEach(([id,count]) => {
    const tile = ALL_TILES[id];
    for (let i=0;i<count;i++) tiles.push(tile);
  });

  const jokers   = tiles.filter(t=>t.type==='JOKER');
  const nonJokers= tiles.filter(t=>t.type!=='JOKER');

  const hand = {
    jokers: jokers.length,
    flowers: nonJokers.filter(t=>t.type==='FLOWER'),
    winds:   {NORTH:0,SOUTH:0,EAST:0,WEST:0},
    dragons: {WHITE:0,GREEN:0,RED:0},
    numberCounts: {},
    suitCounts:   {BAM:0,CRK:0,DOT:0},
    pairs:[],pungs:[],kongs:[],
    dominantSuit: null,
    hasEvenConc: false, hasOddConc: false,
  };

  for (const t of nonJokers) {
    if (t.type==='NUMBER') {
      hand.suitCounts[t.suit]++;
      if (!hand.numberCounts[t.number]) hand.numberCounts[t.number]={total:0,BAM:0,CRK:0,DOT:0};
      hand.numberCounts[t.number].total++;
      hand.numberCounts[t.number][t.suit]++;
    } else if (t.type==='WIND')   hand.winds[t.wind]++;
    else if   (t.type==='DRAGON') hand.dragons[t.dragon]++;
  }

  const maxSuit = Object.entries(hand.suitCounts).sort((a,b)=>b[1]-a[1])[0];
  if (maxSuit[1]>=4) hand.dominantSuit = maxSuit[0];

  // Pairs/pungs/kongs from raw tiles (no joker)
  for (const [num,counts] of Object.entries(hand.numberCounts)) {
    for (const suit of SUITS) {
      const c = counts[suit];
      if (c>=2) hand.pairs.push({type:'NUMBER',number:parseInt(num),suit});
      if (c>=3) hand.pungs.push({type:'NUMBER',number:parseInt(num),suit});
      if (c>=4) hand.kongs.push({type:'NUMBER',number:parseInt(num),suit});
    }
  }
  for (const [wind,c] of Object.entries(hand.winds)) {
    if (c>=2) hand.pairs.push({type:'WIND',wind});
    if (c>=3) hand.pungs.push({type:'WIND',wind});
    if (c>=4) hand.kongs.push({type:'WIND',wind});
  }
  for (const [dragon,c] of Object.entries(hand.dragons)) {
    if (c>=2) hand.pairs.push({type:'DRAGON',dragon});
    if (c>=3) hand.pungs.push({type:'DRAGON',dragon});
    if (c>=4) hand.kongs.push({type:'DRAGON',dragon});
  }

  const nums = Object.keys(hand.numberCounts).map(Number);
  hand.hasEvenConc = nums.filter(n=>n%2===0).length>=3;
  hand.hasOddConc  = nums.filter(n=>n%2!==0).length>=3;

  return hand;
}

// ============================================================
// SCORING ENGINE
// Key principles:
// 1. Groups scored in priority order: pairs first, then singles,
//    then pungs, kongs, quints — tiles consumed as we go
// 2. Jokers NOT committed to any group — they reduce overall
//    difficulty as a flexible asset applied to final score only
// 3. Each tile type is suit-specific — dragons, winds, numbers
//    never pooled across different types
// ============================================================

function getSuitCombos(n) {
  if (n===0) return [{}];
  if (n===1) return SUITS.map(s=>({A:s}));
  if (n===2) {
    const c=[];
    for (const a of SUITS) for (const b of SUITS) if (a!==b) c.push({A:a,B:b});
    return c;
  }
  const c=[];
  for (const a of SUITS) for (const b of SUITS) for (const cc of SUITS)
    if (a!==b && b!==cc && a!==cc) c.push({A:a,B:b,C:cc});
  return c;
}

// Score a single group against a tile pool (tiles consumed in place)
// Returns { matched, needed, penalty, canClaim, dragonNote }

// ============================================================
// SCORING ENGINE — mechanics-only difficulty model
// Difficulty driven by: tiles missing, calling availability, joker eligibility
// No tile-type bias — winds/dragons/numbers treated identically
// Jokers remain a flexible hand-level asset, never assigned to a specific group
// ============================================================

function scoreGroup(g, suit, pool) {
  let holds = 0;

  if (g.tileType==='NUMBER' && g.number!=null) {
    const key = suit ? `${g.number}_${suit}` : null;
    if (key) {
      holds = pool[key] || 0;
    } else {
      holds = Math.max(
        pool[`${g.number}_BAM`]||0,
        pool[`${g.number}_CRK`]||0,
        pool[`${g.number}_DOT`]||0
      );
    }
  } else if (g.tileType==='FLOWER') {
    holds = pool['FLOWER'] || 0;
  } else if (g.tileType==='DRAGON') {
    if (g.dragon) {
      holds = pool[`DRAGON_${g.dragon}`] || 0;
    } else if (g.dragonRequirement==='matching' && suit) {
      holds = pool[`DRAGON_${MATCHING_DRAGON[suit]}`] || 0;
    } else if (g.dragonRequirement==='opposing' && suit) {
      holds = Math.max(0,...OPPOSING_DRAGONS[suit].map(d=>pool[`DRAGON_${d}`]||0));
    } else if (g.dragonRequirement==='any') {
      holds = Math.max(0,...Object.keys(hand_dragons_list).map(d=>pool[`DRAGON_${d}`]||0));
    }
  } else if (g.tileType==='WIND') {
    if (g.wind) {
      holds = pool[`WIND_${g.wind}`] || 0;
    } else if (g.windFlex==='any') {
      holds = Math.max(0,...['NORTH','EAST','WEST','SOUTH'].map(w=>pool[`WIND_${w}`]||0));
    }
  }

  let resolvedDk = null;
  const effective   = Math.min(holds, g.count);
  const stillNeeded = Math.max(0, g.count - effective);

  // Consume tiles from pool
  if (effective > 0) {
    if (g.tileType==='NUMBER' && g.number!=null) {
      const key = suit ? `${g.number}_${suit}` : findBestNumKey(g.number, pool);
      if (key) pool[key] = Math.max(0,(pool[key]||0) - effective);
    } else if (g.tileType==='FLOWER') {
      pool['FLOWER'] = Math.max(0,(pool['FLOWER']||0) - effective);
    } else if (g.tileType==='DRAGON') {
      const dk = resolveDragonKey(g, suit, pool);
      if (dk) pool[dk] = Math.max(0,(pool[dk]||0) - effective);
      resolvedDk = dk;
    } else if (g.tileType==='WIND') {
      const wk = g.wind ? `WIND_${g.wind}` : findBestWindKey(pool);
      if (wk) pool[wk] = Math.max(0,(pool[wk]||0) - effective);
    }
  }

  const canClaim = g.groupType!=='single' && g.groupType!=='pair';

  // DIFFICULTY — mechanics-only, no tile-type weighting
  // Claimable groups: discard calling available, jokers can help
  //   1 missing → nearly callable → low difficulty
  //   2+ missing → needs wall tiles first → moderate
  // Pairs: no calling before Mahjong, no jokers — pure wall draws
  //   0 held → need both tiles naturally → very high difficulty
  //   1 held → need one tile naturally → medium difficulty
  //   complete → zero difficulty
  // Singles: no calling before Mahjong, no jokers — single wall draw needed
  //   difficulty adjusted by structural context in scoreHand
  let difficultyPerTile;
  if (canClaim) {
    difficultyPerTile = stillNeeded === 1 ? 0.6 : 1.0;
  } else if (g.groupType === 'pair') {
    if      (holds === 0) difficultyPerTile = 2.0;
    else if (holds === 1) difficultyPerTile = 1.4;
    else                  difficultyPerTile = 0;
  } else {
    // single — base difficulty; structural context applied in scoreHand loop
    difficultyPerTile = 1.3;
  }

  const penalty = stillNeeded * difficultyPerTile;

  // Dragon notes for UI — unchanged
  let dragonNote = null;
  if (g.tileType==='DRAGON' && g.dragonRequirement==='opposing' && suit && holds===0) {
    const matchD = MATCHING_DRAGON[suit];
    if ((pool[`DRAGON_${matchD}`]||0)>0)
      dragonNote=`You hold ${matchD} Dragon — that MATCHES ${suit}s, not opposes it.`;
  }
  if (g.tileType==='DRAGON' && g.dragonRequirement==='matching' && suit && holds===0) {
    const matchD = MATCHING_DRAGON[suit];
    const wrongD = ['GREEN','RED','WHITE'].find(d=>d!==matchD&&(pool[`DRAGON_${d}`]||0)>0);
    if (wrongD) dragonNote=`You hold ${wrongD} Dragon — wrong color for ${suit}s. Need ${matchD}.`;
  }

  // If no tiles were consumed (holds=0), resolvedDk wasn't set during consumption.
  // Pool is still untouched for this group, so resolve it now.
  if (g.tileType==='DRAGON' && !resolvedDk) {
    resolvedDk = resolveDragonKey(g, suit, pool);
  }
  return { effective, stillNeeded, penalty, canClaim, dragonNote, holds, groupIsClaimable: canClaim, resolvedDk };
}

const hand_dragons_list = {GREEN:1,RED:1,WHITE:1};

function findBestNumKey(number, pool) {
  let best=null, bestVal=-1;
  for (const s of SUITS) {
    const k=`${number}_${s}`;
    if ((pool[k]||0)>bestVal) { bestVal=pool[k]||0; best=k; }
  }
  return best;
}

function resolveDragonKey(g, suit, pool) {
  if (g.dragon) return `DRAGON_${g.dragon}`;
  if (g.dragonRequirement==='matching'&&suit) return `DRAGON_${MATCHING_DRAGON[suit]}`;
  if (g.dragonRequirement==='opposing'&&suit) {
    return `DRAGON_${OPPOSING_DRAGONS[suit].reduce((best,d)=>(pool[`DRAGON_${d}`]||0)>(pool[`DRAGON_${best}`]||0)?d:best,OPPOSING_DRAGONS[suit][0])}`;
  }
  if (g.dragonRequirement==='any') {
    return `DRAGON_${['GREEN','RED','WHITE'].reduce((best,d)=>(pool[`DRAGON_${d}`]||0)>(pool[`DRAGON_${best}`]||0)?d:best,'GREEN')}`;
  }
  return null;
}

function findBestWindKey(pool) {
  return `WIND_${['NORTH','EAST','WEST','SOUTH'].reduce((best,w)=>(pool[`WIND_${w}`]||0)>(pool[`WIND_${best}`]||0)?w:best,'NORTH')}`;
}

function buildPool(hand) {
  const pool = {};
  for (const [num,counts] of Object.entries(hand.numberCounts)) {
    for (const s of SUITS) pool[`${num}_${s}`] = counts[s]||0;
  }
  for (const [w,c] of Object.entries(hand.winds))   pool[`WIND_${w}`]   = c;
  for (const [d,c] of Object.entries(hand.dragons)) pool[`DRAGON_${d}`] = c;
  pool['FLOWER'] = hand.flowers.length;
  return pool;
}

function scoreHand(handDef, suitMap, hand) {
  const pool = buildPool(hand);

  // Groups scored: pairs first (consume tiles before pungs), then singles, then claimable
  const groupOrder = {pair:0, single:1, pung:2, kong:3, quint:4};
  const sorted = [...handDef.groups].sort((a,b)=>(groupOrder[a.groupType]||2)-(groupOrder[b.groupType]||2));

  let matched=0, total=0, penalty=0;
  let readyToCallCount=0, buildThenCallCount=0;
  const details = { matched:[], missing:[], dragonNotes:[], jokerPositions:0 };

  for (const g of sorted) {
    total += g.count;
    const suit = g.suit ? suitMap[g.suit] : null;
    const r    = scoreGroup(g, suit, pool);

    matched += r.effective;
    if (r.dragonNote) details.dragonNotes.push(r.dragonNote);
    if (r.groupIsClaimable) details.jokerPositions++;

    if (r.effective >= g.count) {
      const resolvedDragonKey = g.tileType==='DRAGON' ? (g.dragon || (r.resolvedDk ? r.resolvedDk.replace('DRAGON_','') : null)) : null;
      details.matched.push({label:g.label, groupType:g.groupType, suit, number:g.number, tileType:g.tileType, wind:g.wind||null, dragon:resolvedDragonKey});
    } else {
      // ── Claiming state ──────────────────────────────────────────────
      let claimState = 'mustDraw';
      if (!handDef.concealed && r.groupIsClaimable) {
        const readyNow       = r.holds >= (g.count - 1);
        // Joker check: use ALL jokers — if holds + jokers >= count-1, ready to call
        // Even 0 tiles held + 3 jokers on a kong = ready to call
        const readyWithJoker = !readyNow && hand.jokers > 0 && (r.holds + hand.jokers) >= (g.count - 1);
        if (readyNow)            { claimState = 'readyToCall';     readyToCallCount++; }
        else if (readyWithJoker) { claimState = 'readyWithJoker';  readyToCallCount++; }
        else                     { claimState = 'pullMoreThenCall'; buildThenCallCount++; }
      }

      // ── Per-group penalty ────────────────────────────────────────────
      // Use mechanics-based difficulty from scoreGroup
      // For singles: apply structural context multiplier
      // Singles clearly supporting a run/sequence are less penalized than isolated ones
      let groupPenalty = r.penalty;

      if (g.groupType === 'single' && r.stillNeeded > 0 && g.number != null) {
        // Connected single: another group in this hand requires an adjacent number (±1 or ±2)
        // This signals the single is part of a run or near-sequence pattern
        const adjacentInHand = handDef.groups.some(other =>
          other !== g &&
          other.number != null &&
          Math.abs(other.number - g.number) <= 2
        );
        // Connected: 15% reduction — still harder than claimable, but not isolated
        // Isolated: full base penalty maintained
        const singleContextMult = adjacentInHand ? 0.85 : 1.0;
        groupPenalty = r.stillNeeded * 1.3 * singleContextMult;
      }

      // Claim bonus: reduces penalty for groups that are close to callable
      // readyToCall → significant relief (one discard away)
      // readyWithJoker → meaningful relief (joker enables call — joker is flexible but still a cost)
      // pullMoreThenCall → small relief (claimable eventually, just not yet)
      // mustDraw → no relief
      const claimBonus = claimState==='readyToCall'      ? 0.55
                       : claimState==='readyWithJoker'   ? 0.35
                       : claimState==='pullMoreThenCall'  ? 0.10
                       : 0;

      groupPenalty = groupPenalty * (1 - claimBonus);
      penalty += groupPenalty;

      const stillToDrawBeforeCall = claimState==='pullMoreThenCall'
        ? Math.max(0, (g.count-1) - r.holds - hand.jokers)
        : 0;

      details.missing.push({
        label:       g.label,
        need:        r.stillNeeded,
        holds:       r.holds,
        claimState,
        isPairSingle:!r.groupIsClaimable,
        groupType:   g.groupType,
        stillToDrawBeforeCall,
        suit,
        number:      g.number,
        tileType:    g.tileType,
        wind:        g.wind||null,
        dragon:      g.tileType==='DRAGON' ? (g.dragon || (r.resolvedDk ? r.resolvedDk.replace('DRAGON_','') : null)) : null,
        tileHint:    g.tileType==='DRAGON' ? (g.dragon||'dragon')
                   : g.tileType==='WIND'   ? (g.wind||'wind')
                   : g.number ? String(g.number) : 'tile'
      });
    }
  }

  if (total===0) return null;
  const fitScore = Math.round((matched/total)*100);

  // ── JOKER BONUS — flexible asset, gradient scaling ───────────────
  // Jokers improve overall claimable-group viability — not tied to any one group.
  // Value scales smoothly with hand viability (no cliff effect).
  // Range: 3.0 pts/joker at fit=0 → 7.0 pts/joker at fit=100
  const jokerViabilityScale = 3 + (fitScore / 100) * 4;
  const jokerBonus = hand.jokers * jokerViabilityScale;

  // ── CALL BONUS ────────────────────────────────────────────────────
  const callBonus = readyToCallCount * 4;

  // ── SCATTERED PAIR PENALTY — structural check only ────────────────
  // Only penalizes pairs that are structurally disconnected from the hand.
  // "Disconnected" = pair's number has no adjacent matched group number (±2)
  // Honor pairs (wind/dragon) treated as disconnected outside winds_dragons hands.
  // Does NOT fire when there is claimable structure already matched.
  const matchedClaimable = details.matched.filter(
    m => m.groupType !== 'pair' && m.groupType !== 'single'
  ).length;

  // ── CONCEALED PENALTY ─────────────────────────────────────────────
  let concPenalty = 0;
  if (handDef.concealed) {
    concPenalty = fitScore >= 70 ? 10 : 13;
    // Reduce penalty based on jokers and structural closeness
    const jokerRelief    = hand.jokers * 1.5;
    const structRelief   = (fitScore / 100) * 4;
    concPenalty = Math.max(0, concPenalty - jokerRelief - structRelief);
  }
  if (handDef.section === 'singles_and_pairs') concPenalty += 7;

  // ── RIGIDITY PENALTY — isolated missing singles only ──────────────
  // Singles that are structurally connected (adjacent matched number ±2) are
  // already softened by singleContextMult in the loop above — not penalized again.
  // Only truly isolated missing singles (no nearby matched number) contribute here.
  const isolatedMissingSingles = details.missing.filter(m => {
    if (m.groupType !== 'single') return false;
    if (!m.number) return handDef.section !== 'winds_dragons';
    return !details.matched.some(
      o => o.number != null && Math.abs(o.number - m.number) <= 2
    );
  }).length;

  const rigidityPenalty = isolatedMissingSingles >= 2
    ? (isolatedMissingSingles - 1) * 3
    : 0;

  // ── FINAL SCORE ───────────────────────────────────────────────────
  const finalScore = Math.max(0,
    fitScore
    - Math.round(penalty * 1.8)
    - rigidityPenalty
    + jokerBonus
    + callBonus
    - concPenalty
  );

    const isDragon = /^D+$/.test(t) || t==='Soap';
    // Literal color map (for dragons)
    const literalColors = {'G':'#2d6a3f','R':'#c0392b','N':'#1F2A36','':'#1a3060'};
    const color = isAlwaysBlue ? blueColor
                : isDragon     ? (c==='' ? blueColor : (literalColors[c] || blueColor))
                : c===''       ? blueColor
                : (suitColors[c] || suitColors.N);
    return `<span style="color:${color};font-weight:700;letter-spacing:0.5px">${t}</span>`;
  }).join('');
}

    'consecutive_run':'Consecutive Run','13579':'13579',
    'quints':'Quints','singles_and_pairs':'Singles & Pairs'

  const name = sectionNames[section]||section;
  return side ? `${name} Line ${line} — ${side}` : `${name} Line ${line}`;
}

// FLEXIBLE NUMBER RESOLUTION
// ============================================================

function resolveHand(handDef, flexType, values) {
  return {
    ...handDef,
    groups: handDef.groups.map(g => {
      if (!g.numberFlex) return g;
      const m = {
        'like':values[0],
        'even':values[0],'even_kong':values[0],
        'odd':values[0],'odd_kong':values[0],
        'odd_float':values[0],'odd_float_kong':values[0],
        'consec2_pos1':values[0],'consec2_pos2':values[1],
        'consec3_pos1':values[0],'consec3_pos2':values[1],'consec3_pos3':values[2],
        'consec4_pos1':values[0],'consec4_pos2':values[1],'consec4_pos3':values[2],'consec4_pos4':values[3],
        'consec5_outer1':values[0],'consec5_inner1':values[1],'consec5_inner2':values[2],
        'consec5_inner3':values[3],'consec5_outer2':values[4],
        'consec7_pos1':values[0],'consec7_pos2':values[1],'consec7_pos3':values[2],
        'consec7_pos4':values[3],'consec7_pos5':values[4],'consec7_pos6':values[5],'consec7_pos7':values[6],
        '369_pair':values[0],'369_kong':values[0],'369_single1':values[1],'369_single2':values[2],
        'tworank_pos1':values[0],'tworank_pos2':values[1],
      };
      const v = m[g.numberFlex];
      return v != null ? {...g, number:v} : g;
    })
  };
}

function suitComboHasConflict(handDef, suitMap) {
  // Check if any number appears in BOTH a single/pair group AND a pung/kong/quint
  // group with the same suit assignment — singles consume tiles the pung needs
  const singlesAndPairs = handDef.groups.filter(g=>
    (g.groupType==='single'||g.groupType==='pair') && g.number && g.suit
  );
  const pungsAndUp = handDef.groups.filter(g=>
    (g.groupType==='pung'||g.groupType==='kong'||g.groupType==='quint') && g.number && g.suit
  );
  for (const s of singlesAndPairs) {
    for (const p of pungsAndUp) {
      if (s.number===p.number && s.suit===p.suit && suitMap[s.suit]===suitMap[p.suit]) {
        // Same number, same suit slot assigned same suit — conflict
        // BUT this is only a problem if it's the same suit (A===A is fine if A and A
        // are intentionally the same suit, like 2026 L4 pair+pung of 2 in Suit A)
        // The real conflict is when the hand INTENDS different suits but got same
        // We rely on the hand definition: if groups have SAME suit letter, they share suit by design
        // If they have DIFFERENT suit letters but map to same suit, that's the conflict
        if (s.suit !== p.suit) return true;
      }
    }
  }
  return false;
}

function findBestScore(handDef, hand) {
  const suitCombos = getSuitCombos(handDef.suitsRequired||0);
  let best = null;

  const tryScore = (def, suitMap) => {
    // Skip combos where different suit slots map to the same suit AND
    // that causes a conflict between singles/pairs and pungs of same number
    if (suitComboHasConflict(def, suitMap)) return;
    const r = scoreHand(def, suitMap, hand);
    if (!r) return;

    // Priority scoring: pairs and singles MUST be filled before considering
    // callable group bonuses. A combo that fills your singles beats one that
    // leaves them empty even if the callable groups score higher.
    //
    // Compute tiles toward pair/single positions (fully matched)
    const priorityTilesFull = r.details.matched
      .filter(m => m.groupType === 'pair' || m.groupType === 'single')
      .reduce((sum, m) => sum + (m.groupType === 'pair' ? 2 : 1), 0);
    // Partial holds toward pair/single positions
    const priorityTilesPartial = r.details.missing
      .filter(m => m.isPairSingle && m.holds > 0)
      .reduce((sum, m) => sum + m.holds, 0);
    const priorityScore = priorityTilesFull * 10 + priorityTilesPartial;

    // Only replace best if this combo fills MORE priority tiles,
    // OR equal priority tiles with a higher final score
    const isBetter = !best
      || priorityScore > (best._priorityScore || 0)
      || (priorityScore === (best._priorityScore || 0) && r.finalScore > best.finalScore);

    if (isBetter) {
      // Save previous best as secondBest before replacing
      if (best && best.suitMap && JSON.stringify(best.suitMap) !== JSON.stringify(suitMap)) {
        best._secondBest = {matched: best.matched, suitMap: best.suitMap};
      }
      best = {...r, handDef, _priorityScore: priorityScore, _secondBest: best?._secondBest||null};
    } else if (best && !best._secondBest && r.finalScore > 0 &&
               JSON.stringify(suitMap) !== JSON.stringify(best.suitMap)) {
      // Track second best different suit assignment
      if (r.matched >= best.matched - 2) {
        best._secondBest = {matched: r.matched, suitMap: {...suitMap}};
      }
    }
  };

  for (const suitMap of suitCombos) {
    const flex = handDef.flexibility;
    if (flex==='any_like_number') {
      for (let n=1;n<=9;n++) tryScore(resolveHand(handDef,'like',[n]), suitMap);
    } else if (flex==='any_consecutive') {
      const rl = Math.min(handDef.runLength||3, 9);
      const maxStart = Math.max(1, 10-rl);
      for (let s=1;s<=maxStart;s++) {
        const nums = Array.from({length:rl},(_,i)=>s+i);
        tryScore(resolveHand(handDef,'consec',nums), suitMap);
      }
    } else if (flex==='any_two_ranks') {
      // Try ALL pairs of distinct ranks (1-9) in the mapped suit.
      // This is specifically for hands like QT_L3 where any two ranks in
      // the same suit are valid — numeric distance is irrelevant.
      // We score all 36 rank-pairs and keep the best fit via tryScore.
      const suit = suitMap['A'];
      for (let a=1;a<=9;a++) {
        for (let b=a+1;b<=9;b++) {
          tryScore(resolveHand(handDef,'tworank',[a,b]), suitMap);
        }
      }
    } else if (flex==='any_even_number'||flex==='any_even_kong') {
      for (const n of [2,4,6,8]) tryScore(resolveHand(handDef,'even',[n]), suitMap);
    } else if (flex==='any_odd_number') {
      for (const n of [1,3,5,7,9]) tryScore(resolveHand(handDef,'odd',[n]), suitMap);
    } else if (flex==='369_block') {
      for (const p of [3,6,9]) {
        const s=[3,6,9].filter(x=>x!==p);
        tryScore(resolveHand(handDef,'369block',[p,s[0],s[1]]), suitMap);
      }
    } else if (flex==='floating_pair_odd') {
      for (const n of [1,3,5,7,9]) tryScore(resolveHand(handDef,'floatpair',[n]), suitMap);
    } else {
      tryScore(handDef, suitMap);
    }
  }
  return best;
}

const SECTION_SIGNALS = {
  // 2026: need pair of 2s AND a 6 or White Dragon — real foundation
  '2026': h => {
    const has2pair = Object.values({BAM:h.numberCounts[2]?.BAM||0,CRK:h.numberCounts[2]?.CRK||0,DOT:h.numberCounts[2]?.DOT||0}).some(c=>c>=2);
    const has6 = (h.numberCounts[6]?.total||0)>=1;
    const hasWD = h.dragons.WHITE>=1;
    return has2pair && (has6||hasWD);
  },
  // 2468: need at least 3 different even numbers with real tile count
  '2468': h => {
    const evens = [2,4,6,8].filter(n=>(h.numberCounts[n]?.total||0)>=2).length;
    const evensSingle = [2,4,6,8].filter(n=>(h.numberCounts[n]?.total||0)>=1).length;
    return evens>=2 || evensSingle>=4;
  },
  // Any Like Numbers: need 3+ of same number in one suit
  'any_like_numbers': h => {
    // Need 4+ of same number in same suit to be meaningful for ALN hands
    return Object.values(h.numberCounts).some(nc=>
      (nc.BAM||0)>=4 || (nc.CRK||0)>=4 || (nc.DOT||0)>=4
    );
  },
  // Winds & Dragons: need real wind/dragon concentration
  'winds_dragons': h => {
    const windTotal = Object.values(h.winds).reduce((a,b)=>a+b,0);
    const windPairs = Object.values(h.winds).filter(c=>c>=2).length;
    const dragonTotal = Object.values(h.dragons).reduce((a,b)=>a+b,0);
    const dragonPairs = Object.values(h.dragons).filter(c=>c>=2).length;
    // Need meaningful wind/dragon concentration — not just 2 stray dragons
    // dragonPairs = number of dragon TYPES with a pair (max 3)
    // Require: 2+ wind pairs, OR 4+ winds, OR 2+ dragon-type pairs, OR wind pair + dragon pair
    return windPairs>=2 || windTotal>=4 || dragonPairs>=2 || (windPairs>=1 && dragonPairs>=1);
  },
  // 369: need at least 2 of the 3 key numbers with real tiles (not just singles)
  '369': h => {
    const count369 = [3,6,9].filter(n=>(h.numberCounts[n]?.total||0)>=2).length;
    const present369 = [3,6,9].filter(n=>(h.numberCounts[n]?.total||0)>=1).length;
    return count369>=2 || (count369>=1 && present369>=3);
  },
  // Consecutive Run: need 3+ consecutive in same suit with meaningful tiles
  'consecutive_run': h => {
    for (const suit of SUITS) {
      const nums = Object.entries(h.numberCounts)
        .filter(([,nc])=>(nc[suit]||0)>=1)
        .map(([n])=>parseInt(n))
        .sort((a,b)=>a-b);
      let run=1, maxRun=1;
      for (let i=1;i<nums.length;i++) {
        if (nums[i]===nums[i-1]+1) run++;
        else run=1;
        maxRun = Math.max(maxRun, run);
      }
      // Need run of 3 AND at least 4 total suited tiles (real concentration)
      const suitTotal = Object.values(h.numberCounts).reduce((s,nc)=>s+(nc[suit]||0),0);
      if (maxRun>=3 && suitTotal>=4) return true;
    }
    return false;
  },
  // 13579: need 3+ odd numbers with real tiles
  '13579': h => {
    const oddsWithPairs = [1,3,5,7,9].filter(n=>(h.numberCounts[n]?.total||0)>=2).length;
    const oddsPresent = [1,3,5,7,9].filter(n=>(h.numberCounts[n]?.total||0)>=1).length;
    return oddsWithPairs>=2 || oddsPresent>=4;
  },
  // Quints: need 2+ jokers
  'quints': h => h.jokers>=2,
  // Singles & Pairs: need multiple actual pairs of winds or dragons
  'singles_and_pairs': h => {
    // Signal always true — threshold handled by countTilesForSection (6+ tiles)
    return true;
  },
};

const SECTION_REASON = {
  '2026':           h => `Your 2s${h.dragons.WHITE?' and White Dragon':''} point straight here.`,
  '2468':           h => `You're holding ${[2,4,6,8].filter(n=>(h.numberCounts[n]?.total||0)>=1).join(', ')} — even numbers are your base.`,
  'any_like_numbers':h => {
    const best = Object.entries(h.numberCounts).sort((a,b)=>Math.max(b[1].BAM,b[1].CRK,b[1].DOT)-Math.max(a[1].BAM,a[1].CRK,a[1].DOT))[0];
    return best ? `Your concentration of ${best[0]}s across suits makes this worth a look.` : 'You have multiples of the same number across suits.';
  },
  'winds_dragons':  h => {
    const wc = Object.values(h.winds).reduce((a,b)=>a+b,0);
    const dc = Object.values(h.dragons).reduce((a,b)=>a+b,0);
    return `${wc} wind${wc!==1?'s':''} and ${dc} dragon${dc!==1?'s':''} in hand — this section is built for that.`;
  },
  '369':            h => `You're holding ${[3,6,9].filter(n=>(h.numberCounts[n]?.total||0)>=1).join(', ')} — the building blocks of this section.`,
  'consecutive_run':h => `Your tiles run in sequence — Consecutive Run rewards that.`,
  '13579':          h => `You've got ${[1,3,5,7,9].filter(n=>(h.numberCounts[n]?.total||0)>=1).join(', ')} — odd numbers are your strength here.`,
  'quints':         h => `${h.jokers} joker${h.jokers!==1?'s':''} in hand — quints are in play.`,
  'singles_and_pairs': h => `Multiple pairs in hand — Singles & Pairs is worth considering.`,
};

const SECTION_DISPLAY = {
  '2026':'2026','2468':'2468','any_like_numbers':'Any Like Numbers',
  'winds_dragons':'Winds & Dragons','369':'369','consecutive_run':'Consecutive Run',
  '13579':'13579','quints':'Quints','singles_and_pairs':'Singles & Pairs'
};

function countTilesForSection(sectionKey, hand) {
  // Count actual tiles matched (not joker-adjusted) toward any hand in this section
  const handsInSection = HAND_LIBRARY.filter(h => h.section === sectionKey);
  let maxTiles = 0;
  for (const handDef of handsInSection) {
    const result = findBestScore(handDef, hand);
    // Use raw matched count only — not joker-inflated
    if (result && result.matched > maxTiles) maxTiles = result.matched;
  }
  return maxTiles;
}

function getSectionFocus(hand, topSections, displayedHandSections) {
  const SECTION_TILE_THRESHOLD = 6;
  const SP_TILE_THRESHOLD = 9;

  const qualifying = Object.entries(SECTION_SIGNALS)
    .filter(([,fn]) => fn(hand))
    .map(([key]) => {
      const tileCount = countTilesForSection(key, hand);
      const threshold = key === 'singles_and_pairs' ? SP_TILE_THRESHOLD : SECTION_TILE_THRESHOLD;
      return {
        key,
        name: SECTION_DISPLAY[key],
        reason: SECTION_REASON[key](hand),
        priority: topSections && topSections.includes(key) ? 1 : 0,
        tileCount,
        threshold
      };
    })
    .filter(s => s.tileCount >= s.threshold)
    // Fix 6: only show section if at least one displayed hand is in it
    .filter(s => displayedHandSections && displayedHandSections.includes(s.key));

  qualifying.sort((a,b) => b.priority - a.priority || b.tileCount - a.tileCount);
  return qualifying.slice(0, 4);
}

// ============================================================
// DISCARD ANALYSIS
// ============================================================

function getDiscardRecommendations(tiles, top3, pivots, next5, hand) {
  // Weighted keep score by hand rank:
  //   hand #1 → +4, hand #2 → +2, hand #3 → +1, pivot → +0.5, next5 → +0.5
  // Discard priority: lowest keep score first
  // Ties: next5-only (0.5) discards before #3-only (1)

  // Only protect tiles used in top 3 hands — next5/pivots are too speculative
  // to save a tile from discard. A tile must support one of your top 3 to be kept.
  const handWeights = [
    ...(top3[0] ? [{ rec: top3[0], weight: 4 }] : []),
    ...(top3[1] ? [{ rec: top3[1], weight: 2 }] : []),
    ...(top3[2] ? [{ rec: top3[2], weight: 1 }] : []),
  ];

  const tileScores = {};

  Object.entries(selectedTiles).forEach(([id, count]) => {
    const tile = ALL_TILES[id];
    if (!tile || tile.type === 'JOKER') return;

    let keepScore = 0;

    handWeights.forEach(({ rec, weight }) => {
      const tileMatchesGroup = (m, requireHolds) => {
        if (requireHolds && m.holds === 0) return false;
        if (tile.type==='FLOWER' && m.tileType==='FLOWER') return true;
        if (tile.type==='NUMBER' && m.tileType==='NUMBER' &&
            m.number===tile.number && m.suit===tile.suit) return true;
        if (tile.type==='WIND' && m.tileType==='WIND') {
          return m.wind === tile.wind;
        }
        if (tile.type==='DRAGON' && m.tileType==='DRAGON') {
          if (m.dragon && m.dragon===tile.dragon) return true;
          const rawSuit = m.suit;
          const recSuit = (rawSuit==='BAM'||rawSuit==='CRK'||rawSuit==='DOT')
            ? rawSuit
            : (rawSuit && rec.suitMap ? rec.suitMap[rawSuit] : null);
          if (recSuit==='BAM' && tile.dragon==='GREEN') return true;
          if (recSuit==='CRK' && tile.dragon==='RED') return true;
          if (recSuit==='DOT' && tile.dragon==='WHITE') return true;
          if (recSuit==='BAM' && (tile.dragon==='RED'||tile.dragon==='WHITE')) return true;
          if (recSuit==='CRK' && (tile.dragon==='GREEN'||tile.dragon==='WHITE')) return true;
          if (recSuit==='DOT' && (tile.dragon==='GREEN'||tile.dragon==='RED')) return true;
          if (!recSuit && !m.dragon && m.holds > 0) return true;
        }
        return false;
      };
      const inMatched = rec.details.matched.some(m => tileMatchesGroup(m, false));
      const inMissing = rec.details.missing.some(m => tileMatchesGroup(m, true));
      if (inMatched || inMissing) keepScore += weight;
    });

    tileScores[id] = { tile, keepScore, count };
  });

  // Sort by keepScore ascending — lowest keep score = best discard candidate
  const sorted = Object.entries(tileScores)
    .sort((a,b) => a[1].keepScore - b[1].keepScore);

  // Only recommend tiles with keepScore === 0 (truly dead — support no ranked hand)
  // If every tile supports at least one ranked hand, return empty → fallback message shows
  const candidates = sorted.filter(([,v]) => v.keepScore === 0);

  return candidates.slice(0,4).map(([id,{tile}]) => {
    let label = '';
    if (tile.type==='NUMBER') label=`${tile.number}-${tile.suit[0]}${tile.suit.slice(1).toLowerCase()}`;
    else if (tile.type==='WIND') label=`${tile.wind[0]}${tile.wind.slice(1).toLowerCase()} Wind`;
    else if (tile.type==='DRAGON') label=`${tile.dragon[0]}${tile.dragon.slice(1).toLowerCase()} Dragon`;
    else if (tile.type==='FLOWER') label='Flower';
    return label;
  })
  .filter(Boolean);
}
