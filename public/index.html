function getTileChipLabel(m, suitMap) {
  const resolvedSuit = (m.suit==='BAM'||m.suit==='CRK'||m.suit==='DOT')
    ? m.suit : (m.suit && suitMap ? suitMap[m.suit] : null);
  const suitShort = resolvedSuit==='BAM'?'B':resolvedSuit==='CRK'?'C':resolvedSuit==='DOT'?'D':null;
  if (m.tileType==='NUMBER' && m.number && suitShort) return `${m.number}${suitShort}`;
  if (m.tileType==='FLOWER') return 'F';
  if (m.tileType==='JOKER') return '★';
  if (m.tileType==='WIND') return m.wind ? m.wind[0] : 'W';
  if (m.tileType==='DRAGON') {
    const d = m.dragon || (resolvedSuit==='BAM'?'GREEN':resolvedSuit==='CRK'?'RED':resolvedSuit==='DOT'?'WHITE':null);
    if (d==='GREEN') return 'GD';
    if (d==='RED')   return 'RD';
    if (d==='WHITE') return 'Soap';
    return 'D';
  }
  return '?';
}

function getTileCls(m) {
  if (m.tileType==='DRAGON') return 'dragon';
  if (m.tileType==='WIND') return 'wind';
  if (m.tileType==='FLOWER') return 'flower';
  if (m.tileType==='JOKER') return 'joker';
  if (m.suit==='BAM') return 'bam';
  if (m.suit==='CRK') return 'crk';
  if (m.suit==='DOT') return 'dot';
  return 'neutral';
}

function formatSectionName(s) { return SECTION_DISPLAY[s]||s; }

function tileLabel(t, suitMap) {
  // Resolve Suit A/B/C to actual suit name
  const suitName = s => {
    if (!s) return '';
    const resolved = suitMap?.[s]||s;
    return resolved==='BAM'?'Bam':resolved==='CRK'?'Crack':resolved==='DOT'?'Dot':resolved;
  };
  return t.label;
}

function glanceText(hand) {
  const parts = [];
  if (hand.dominantSuit) {
    parts.push(`Heavy in ${hand.dominantSuit[0]}${hand.dominantSuit.slice(1).toLowerCase()}s`);
  } else {
    parts.push('Scattered hand');
  }
  if (hand.pairs.length>0) {
    const pairNames = hand.pairs.slice(0,3).map(p=>{
      if (p.type==='NUMBER') return `${p.number}-${p.suit[0]}${p.suit.slice(1).toLowerCase()}`;
      if (p.type==='WIND')   return `${p.wind[0]}${p.wind.slice(1).toLowerCase()} Wind`;
      if (p.type==='DRAGON') return `${p.dragon[0]}${p.dragon.slice(1).toLowerCase()} Dragon`;
      return '';
    }).filter(Boolean);
    parts.push(`pairs in ${pairNames.join(', ')}`);
  }
  if (hand.flowers.length>0) parts.push(`${hand.flowers.length} flower${hand.flowers.length>1?'s':''}`);
  if (hand.jokers>0) parts.push(`${hand.jokers} joker${hand.jokers>1?'s':''}`);
  return parts.join(' · ');
}

function rankRationale(rec, i, top3, hand) {
  const readyCount  = rec.readyToCallCount || 0;
  const buildCount  = rec.buildThenCallCount || 0;
  const mustDrawCount = rec.details.missing.filter(m=>m.isPairSingle).length;
  const isConcealed = rec.handDef.concealed;
  const concNote    = isConcealed ? ' This is concealed — no calling discards during play.' : '';

  // Compare to #1 for context
  const top1        = top3[0];
  const moreTiles   = rec.matched > top1.matched;
  const sameTiles   = rec.matched === top1.matched;
  const fewerTiles  = rec.matched < top1.matched;
  const tileContext = moreTiles ? 'more tiles than your other top hands'
                    : sameTiles ? 'the same number of tiles as your top hand'
                    : 'fewer tiles than your top hand';

  if (i === 0) {
    if (readyCount >= 2)
      return `Ranked first — best overall fit and ${readyCount} group${readyCount>1?'s are':' is'} ready to call right now.${concNote}`;
    if (readyCount === 1)
      return `Ranked first — best tile match and one group is ready to call. Build toward the rest.${concNote}`;
    if (buildCount > 0)
      return `Ranked first — best tile match overall. Your gaps are claimable once you build a bit more.${concNote}`;
    return `Ranked first — best tile match overall, though missing tiles must be drawn from the wall.${concNote}`;
  }

  if (i === 1) {
    if (readyCount >= 2)
      return `Ranked second — ${tileContext} and ${readyCount} groups ready to call right now makes this very accessible.${concNote}`;
    if (readyCount === 1)
      return `Ranked second — ${tileContext} and one group you can call for today.${concNote}`;
    if (mustDrawCount > (top1.details.missing.filter(m=>m.isPairSingle).length))
      return `Ranked second — ${tileContext} but more missing tiles are in pair or single positions that must be drawn naturally.${concNote}`;
    return `Ranked second — ${tileContext}. ${buildCount>0?'Build toward your claimable groups and this hand opens up.':'Most gaps need to come from the wall.'}${concNote}`;
  }

  // #3
  if (readyCount >= 2)
    return `Ranked third — ${tileContext}, but ${readyCount} groups are ready to call right now. Very accessible despite the ranking.${concNote}`;
  if (readyCount === 1)
    return `Ranked third — ${tileContext}, but one group is ready to call. Worth keeping in mind.${concNote}`;
  if (mustDrawCount >= 3)
    return `Ranked third — ${tileContext} and ${mustDrawCount} missing tiles must be drawn naturally. Harder to complete than your top two.${concNote}`;
  if (buildCount > 0)
    return `Ranked third — ${tileContext}. Build toward your claimable groups and this hand could develop.${concNote}`;
  return `Ranked third — ${tileContext}. Keep it in mind as your hand develops.${concNote}`;
}

function pivotTriggerText(rec) {
  // Describe what kind of tiles to watch for — not specific group names
  const missing = rec.details.missing;
  if (!missing.length) return 'Watch this hand as your tiles develop.';

  // Collect tile hints from missing groups, prefer claimable ones
  const claimable = missing.filter(m=>m.claimState!=='mustDraw');
  const source = claimable.length ? claimable : missing;

  // Get unique tile types mentioned
  const hints = [...new Set(source.slice(0,2).map(m=>{
    const hint = m.tileHint;
    if (hint==='tile') return null;
    // Make it a plural noun, not a group type
    if (!isNaN(hint)) return `${hint}s`;
    if (hint==='GREEN') return 'Green Dragons';
    if (hint==='RED') return 'Red Dragons';
    if (hint==='WHITE') return 'Soap Dragons';
    if (['NORTH','SOUTH','EAST','WEST'].includes(hint)) return `${hint[0]}${hint.slice(1).toLowerCase()} Winds`;
    return hint;
  }).filter(Boolean))];

  const jokerNote = rec.handDef.concealed ? '' : ' or jokers';
  if (!hints.length) return 'Watch this hand as your tiles develop.';
  return `If you start pulling ${hints.join(' and/or ')}${jokerNote}, this hand moves into play.`;
}

function resolveLabel(label, suit, suitMap) {
  if (!suitMap && !suit) return label;
  let out = label;
  const suitDisplay = v => v==='BAM'?'Bam':v==='CRK'?'Crack':v==='DOT'?'Dot':v;
  if (suitMap) {
    Object.entries(suitMap).forEach(([key, val]) => {
      const name = suitDisplay(val);
      out = out.split('Suit ' + key).join(name);
      out = out.split('(' + key + ')').join('(' + name + ')');
      out = out.split('Rank ' + key).join(name);
      // Replace standalone key letter when it appears as suit reference
      out = out.replace(new RegExp('\\bSuit\\s+' + key + '\\b', 'g'), name);
    });
  }
  if (suit) {
    const name = suitDisplay(suit);
    out = out.replace(/\bSuit [ABC]\b/g, name);
    out = out.replace(/\bRank [ABC]\b/g, name);
  }
  // Clean up N+1, N+2 style labels — these should already be resolved numbers
  // but strip any remaining flex notation
  out = out.replace(/\bN\+\d\b/g, '');
  // Remove left/right
  out = out.replace(/\s*—\s*(left|right)\b/gi, '');
  return out;
}

function formatMissingItem(m, hand, suitMap) {
  // Build a clean human-readable label from tile properties directly
  const resolvedSuit = (m.suit==='BAM'||m.suit==='CRK'||m.suit==='DOT')
    ? m.suit : (m.suit && suitMap ? suitMap[m.suit] : null);
  const suitName = resolvedSuit==='BAM'?'Bam':resolvedSuit==='CRK'?'Crack':resolvedSuit==='DOT'?'Dot':null;
  const groupName = m.groupType==='quint'?'Quint':m.groupType==='kong'?'Kong':
                    m.groupType==='pung'?'Pung':m.groupType==='pair'?'Pair':'Single';

  let label;
  if (m.tileType==='NUMBER' && m.number && suitName) {
    label = `${groupName} of ${m.number}-${suitName}`;
  } else if (m.tileType==='FLOWER') {
    const flowerTotal = m.holds + m.need;
    label = `${flowerTotal} Flower${flowerTotal!==1?'s':''}` + (flowerTotal > 3 ? '' : '');
    // Override groupName for flowers — just say the count
    label = `${flowerTotal} Flowers`;
  } else if (m.tileType==='WIND') {
    const windName = m.wind ? m.wind[0]+m.wind.slice(1).toLowerCase() : 'Wind';
    label = `${groupName} of ${windName} Winds`;
  } else if (m.tileType==='DRAGON') {
    const d = m.dragon || (resolvedSuit==='BAM'?'GREEN':resolvedSuit==='CRK'?'RED':resolvedSuit==='DOT'?'WHITE':null);
    const dName = d==='GREEN'?'Green':d==='RED'?'Red':d==='WHITE'?'Soap':'';
    label = `${groupName} of ${dName} Dragons`;
  } else {
    // Fallback to resolveLabel
    label = resolveLabel(m.label, m.suit, suitMap);
    if (m.number != null) label = label.replace(/\bN(?:\+\d)?\b/g, String(m.number));
  }
  const need = m.need;
  const holds = m.holds;
  // Use actual group size (holds + need) not groupType assumption
  // Handles edge cases like 6-flower kong where kong count is 6 not 4
  const total = holds + need;

  // Build hold description
  let holdStr = '';
  if (holds > 0 && need > 0) {
    holdStr = ` — you have ${holds} of ${total}`;
  } else if (holds === 0) {
    holdStr = ` — you have none`;
  }

  // Build acquisition description
  let howStr = '';
  if (m.claimState==='readyToCall') {
    howStr = hand.jokers > 0
      ? 'you can call from discard, draw, or use your joker(s)'
      : 'you can call from discard or draw from the wall';
  } else if (m.claimState==='readyWithJoker') {
    howStr = 'you can call from discard if you place your joker(s) here, or draw from the wall';
  } else if (m.claimState==='pullMoreThenCall') {
    howStr = hand.jokers > 0
      ? 'draw more tiles first, then you can call or use your joker(s)'
      : 'draw more tiles first, then you can call';
  } else {
    // mustDraw — for claimable groups in concealed hands, jokers still work
    if (!m.isPairSingle && hand.jokers > 0) {
      howStr = 'you can use your joker(s) or draw from the wall';
    } else if (m.need === 1) {
      howStr = 'must draw from the wall or can call for Mahjongg';
    } else {
      howStr = 'must draw from the wall';
    }
  }

  // Color the tag by urgency
  const tagCls = m.claimState==='readyToCall' ? 'tag-ready'
               : m.claimState==='readyWithJoker' ? 'tag-joker'
               : m.claimState==='pullMoreThenCall' ? 'tag-build'
               : 'tag-draw';

  return `${label}${holdStr} <span class="tag ${tagCls}">${howStr}</span>`;
}

function renderResults(hand, top3, pivots, allScores, is14) {

  // East banner
  document.getElementById('eastBanner').innerHTML = is14
    ? `<div class="east-banner">You have 14 tiles — you are East. Review your top hand options below, then discard your least useful tile to start play.</div>`
    : '';

  document.getElementById('glanceCard').innerHTML = '';
  document.getElementById('sectionFocus').innerHTML = '';

  // ── Helper: tile chip label ───────────────────────────────
  function getTileChipLabel(m, suitMap) {
    const resolvedSuit = (m.suit==='BAM'||m.suit==='CRK'||m.suit==='DOT')
      ? m.suit : (m.suit && suitMap ? suitMap[m.suit] : null);
    const suitShort = resolvedSuit==='BAM'?'B':resolvedSuit==='CRK'?'C':resolvedSuit==='DOT'?'D':null;
    if (m.tileType==='NUMBER' && m.number && suitShort) return `${m.number}${suitShort}`;
    if (m.tileType==='FLOWER') return 'F';
    if (m.tileType==='JOKER') return '★';
    if (m.tileType==='WIND') return m.wind ? m.wind[0] : 'W';
    if (m.tileType==='DRAGON') {
      const d = m.dragon || (resolvedSuit==='BAM'?'GREEN':resolvedSuit==='CRK'?'RED':resolvedSuit==='DOT'?'WHITE':null);
      if (d==='GREEN') return 'GD';
      if (d==='RED')   return 'RD';
      if (d==='WHITE') return 'Soap';
      return 'D';
    }
    return '?';
  }

  function getTileCls(m) {
    if (m.tileType==='DRAGON') return 'dragon';
    if (m.tileType==='WIND') return 'wind';
    if (m.tileType==='FLOWER') return 'flower';
    if (m.tileType==='JOKER') return 'joker';
    if (m.suit==='BAM') return 'bam';
    if (m.suit==='CRK') return 'crk';
    if (m.suit==='DOT') return 'dot';
    return 'neutral';
  }

  // ── Helper: human tile name (no jargon) ──────────────────
  function tileDisplayName(m, suitMap) {
    const resolvedSuit = (m.suit==='BAM'||m.suit==='CRK'||m.suit==='DOT')
      ? m.suit : (m.suit && suitMap ? suitMap[m.suit] : null);
    const suitName = resolvedSuit==='BAM'?'Bam':resolvedSuit==='CRK'?'Crack':resolvedSuit==='DOT'?'Dot':null;
    if (m.tileType==='NUMBER' && m.number && suitName) return `${m.number} ${suitName}`;
    if (m.tileType==='FLOWER') return 'Flower';
    if (m.tileType==='WIND') {
      const w = m.wind; return w ? w[0]+w.slice(1).toLowerCase()+' Wind' : 'Wind';
    }
    if (m.tileType==='DRAGON') {
      const d = m.dragon || (resolvedSuit==='BAM'?'GREEN':resolvedSuit==='CRK'?'RED':resolvedSuit==='DOT'?'WHITE':null);
      return d==='GREEN'?'Green Dragon':d==='RED'?'Red Dragon':d==='WHITE'?'Soap Dragon':'Dragon';
    }
    return 'Tile';
  }

  // ── Helper: callable status ───────────────────────────────
  function callableStatus(m, hand) {
    const holds = m.holds;
    const total = holds + m.need;
    // Callable now: one tile away from completing the group
    if (m.claimState === 'readyToCall' || m.claimState === 'readyWithJoker') {
      return { label: 'Callable now', cls: 'status-callable' };
    }
    // Special case: need===1 means final tile — can always call for Mahjong
    if (m.need === 1 && m.claimState !== 'mustDraw') {
      return { label: 'Callable now', cls: 'status-callable' };
    }
    return { label: 'Not callable yet', cls: 'status-not-callable' };
  }

  // ── Helper: rationale bullets ─────────────────────────────
  function rationaleText(rec, i, top3, hand) {
    const readyCount = rec.readyToCallCount || 0;
    const top1 = top3[0];
    const bullets = [];

    // How many tiles match
    const matchPct = Math.round((rec.matched / rec.total) * 100);
    if (rec.matched === rec.total) {
      bullets.push('All tiles in your hand support this hand');
    } else if (matchPct >= 70) {
      bullets.push(`Strong tile match — ${rec.matched} of ${rec.total} tiles fit`);
    } else {
      bullets.push(`${rec.matched} of ${rec.total} tiles currently fit`);
    }

    // Callable groups
    if (readyCount >= 2) bullets.push(`${readyCount} groups are ready to call right now`);
    else if (readyCount === 1) bullets.push('One group is ready to call');
    else if (rec.buildThenCallCount > 0) bullets.push('Callable groups available once you build further');
    else bullets.push('Missing tiles must come from the wall');

    // Rank context vs #1
    if (i > 0) {
      const diff = top1.matched - rec.matched;
      if (diff === 0) bullets.push('Tied with your top hand on tile count');
      else if (diff <= 2) bullets.push(`${diff} fewer tile${diff>1?'s':''} than your top hand`);
    }

    // Concealed note
    if (rec.handDef.concealed) bullets.push('Concealed — no calling during play, wall draws only');

    return bullets;
  }

  // ── Helper: short one-line summary ───────────────────────
  function handSummary(rec, i, hand) {
    const readyCount = rec.readyToCallCount || 0;
    if (i === 0) {
      if (readyCount >= 2) return 'Best overall fit with multiple callable groups';
      if (readyCount === 1) return 'Best overall fit with one callable group';
      return 'Best overall fit with your current tiles';
    }
    if (i === 1) {
      if (readyCount >= 1) return 'Strong option with callable groups available';
      return 'Strong option — flexible path to completion';
    }
    return 'Viable option — watch as your hand develops';
  }

  // ── Helper: build You Have chips ─────────────────────────
  function buildYouHaveChips(rec, hand) {
    const matchedPool = rec.details.matched.map(m=>({...m,_used:false}));
    const missingPool = rec.details.missing.map(m=>({...m,_used:false}));
    const chipData = [];

    rec.handDef.groups.forEach(g => {
      const fromMatched = matchedPool.find(m=>!m._used && m.label===g.label);
      if (fromMatched) {
        fromMatched._used = true;
        const count = g.groupType==='quint'?5:g.groupType==='kong'?4:g.groupType==='pung'?3:g.groupType==='pair'?2:1;
        chipData.push({label:getTileChipLabel(fromMatched,rec.suitMap), cls:getTileCls(fromMatched), count});
        return;
      }
      const fromMissing = missingPool.find(m=>!m._used && m.label===g.label && m.holds>0);
      if (fromMissing) {
        fromMissing._used = true;
        chipData.push({label:getTileChipLabel(fromMissing,rec.suitMap), cls:getTileCls(fromMissing), count:fromMissing.holds});
      }
    });

    const claimableGroupCount = rec.handDef.groups.filter(g=>g.groupType!=='single'&&g.groupType!=='pair').length;
    if (hand.jokers > 0 && claimableGroupCount > 0) {
      for (let j=0;j<hand.jokers;j++) chipData.push({label:'★',cls:'joker',count:1});
    }

    return chipData.map(({label,cls,count}) =>
      Array.from({length:count},()=>`<span class="yhave-chip ${cls}">${label}</span>`).join('')
    ).join('');
  }

  // ── Helper: build What You Need rows ─────────────────────
  function buildNeedRows(rec, hand) {
    // Merge flowers
    const mergedMissing = [];
    rec.details.missing.forEach(m => {
      const prev = mergedMissing[mergedMissing.length-1];
      if (prev && prev.tileType==='FLOWER' && m.tileType==='FLOWER') {
        mergedMissing[mergedMissing.length-1] = {...prev, holds:prev.holds+m.holds, need:prev.need+m.need};
      } else {
        mergedMissing.push({...m});
      }
    });

    // Sort by hand definition order
    const groupIndexMap = new Map();
    rec.handDef.groups.forEach((g,i) => { if (!groupIndexMap.has(g.label)) groupIndexMap.set(g.label,i); });
    mergedMissing.sort((a,b) => (groupIndexMap.get(a.label)||999) - (groupIndexMap.get(b.label)||999));

    if (!mergedMissing.length) return '<div class="need-row"><span class="need-tile">All groups complete</span></div>';

    const rows = mergedMissing.map(m => {
      const name = tileDisplayName(m, rec.suitMap);
      const holds = m.holds;
      const total = holds + m.need;
      const progress = `${holds}/${total}`;
      const status = callableStatus(m, hand);
      return `<div class="need-row">
        <span class="need-tile">${name}</span>
        <span class="need-progress">${progress}</span>
        <span class="need-status ${status.cls}">${status.label}</span>
      </div>`;
    }).join('');

    const finalNote = '<div style="font-size:12px;color:var(--ink3);padding-top:8px;">Note: Final tile for Mahjong can always be called.</div>';
    return rows + finalNote;
  }

  // ── TOP 3 HANDS ──────────────────────────────────────────
  const top3Container = document.getElementById('top3Container');
  top3Container.innerHTML = '';

  top3.forEach((rec, i) => {
    const card = document.createElement('div');
    card.className = 'rec-card';

    const claimableGroupCount = rec.handDef.groups.filter(g=>g.groupType!=='single'&&g.groupType!=='pair').length;
    const jokerPositions = rec.handDef.groups.filter(
      g=>g.groupType!=='single'&&g.groupType!=='pair'&&!new Set(rec.details.matched.map(m=>m.label)).has(g.label)
    ).length;

    const claimableInHand = claimableGroupCount;
    const jokerContribution = claimableInHand > 0 ? hand.jokers : 0;
    const adjustedMatched = Math.min(rec.matched + jokerContribution, rec.total);

    const rankLabel = ['#1','#2','#3'][i];
    const summary = handSummary(rec, i, hand);
    const youHave = buildYouHaveChips(rec, hand);
    const needRows = buildNeedRows(rec, hand);
    const bullets = rationaleText(rec, i, top3, hand);
    const bulletHTML = bullets.map(b=>`<li>${b}</li>`).join('');

    // Joker section
    const jokerHTML = hand.jokers > 0 ? `
      <div class="rec-section-head">Jokers</div>
      <div class="joker-note">${jokerPositions} possible placement${jokerPositions!==1?'s':''} in this hand.<br>Use to complete near-complete groups. Avoid committing too early.</div>` : '';

    // Dragon warning
    const dragonWarnHTML = rec.details.dragonNotes[0]
      ? `<div class="dragon-warn">${rec.details.dragonNotes[0]}</div>` : '';

    // Concealed note
    const concHTML = rec.handDef.concealed
      ? `<div class="concealed-note">${rec.handDef.section==='singles_and_pairs'
          ? 'No jokers allowed. Every tile must come from the wall.'
          : 'Concealed — no calling during play. Wall draws only except for the final winning tile.'
        }</div>` : '';

    const cardId = `rec-body-${i}`;

    card.innerHTML = `
      <div class="rec-header" onclick="const b=document.getElementById('${cardId}');const collapsed=b.classList.toggle('collapsed');this.querySelector('.rec-toggle').textContent=collapsed?'See Why':'Close';">
        <div class="rec-rank-row">
          <span class="rec-rank-label">${rankLabel}</span>
          <span class="rec-sec-tag">${formatSectionName(rec.handDef.section)}</span>
          ${rec.handDef.concealed?'<span class="conc-badge">Concealed</span>':''}
          <button class="rec-toggle">See Why</button>
        </div>
        <div style="font-size:16px;font-weight:700;color:var(--ink);margin:4px 0 2px">${rec.handDef.cardRef}</div>
        <div class="hand-display">${renderHandDisplay(rec.handDef.id, rec)}</div>
        <div style="font-size:13px;color:var(--ink3);margin-bottom:8px">${summary}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="tiles-matched">${adjustedMatched} / ${rec.total} tiles</span>
          <span class="pts-badge">${rec.handDef.exposedPlay?'Exposed':'Concealed'} · ${rec.handDef.pointValue||25} pts</span>
        </div>
        ${youHave ? `<div class="yhave-chips">${youHave}</div>` : ''}
      </div>
      <div class="rec-body collapsed" id="${cardId}">
        <div class="rec-section-head">Why This Works</div>
        <ul class="rationale-bullets">${bulletHTML}</ul>
        ${dragonWarnHTML}
        <div class="rec-section-head">What You Need</div>
        ${needRows}
        ${concHTML}
        ${jokerHTML}
      </div>`;

    top3Container.appendChild(card);
  });

  // ── NEXT 3 HANDS ─────────────────────────────────────────
  const next5 = allScores.slice(3).filter(r =>
    !pivots.find(p => p.handDef.id === r.handDef.id)
  ).slice(0, 3);

  const next5Container = document.getElementById('next5Container');
  if (next5Container) {
    next5Container.innerHTML = '';
    if (next5.length > 0) {
      const sectionHead = document.createElement('div');
      sectionHead.className = 'section-head';
      sectionHead.textContent = 'Next Best Hands';
      next5Container.appendChild(sectionHead);

      const btn = document.createElement('button');
      btn.className = 'show-more-btn';
      btn.textContent = 'Show next 3 hands';
      const cardsDiv = document.createElement('div');
      cardsDiv.style.display = 'none';

      next5.forEach(rec => {
        const youHave = buildYouHaveChips(rec, hand);
        const totalTiles = rec.handDef.groups.reduce((s,g)=>s+(g.groupType==='quint'?5:g.groupType==='kong'?4:g.groupType==='pung'?3:g.groupType==='pair'?2:1),0);
        const n3ClaimableGroups = rec.handDef.groups.filter(g=>g.groupType!=='single'&&g.groupType!=='pair').length;
        const n3JokerContrib = n3ClaimableGroups > 0 ? hand.jokers : 0;
        const n3AdjustedMatched = Math.min(rec.matched + n3JokerContrib, totalTiles);
        const card = document.createElement('div');
        card.className = 'n5-card';
        card.innerHTML = `
          <div class="n5-header">
            <div class="n5-rank-row">
              <span class="rec-sec-tag">${formatSectionName(rec.handDef.section)}</span>
              <span class="pts-badge" style="margin-left:auto">${rec.handDef.exposedPlay?'Exposed':'Concealed'} · ${rec.handDef.pointValue||25} pts</span>
            </div>
            <div style="font-size:15px;font-weight:700;color:var(--ink);margin:4px 0 4px">${rec.handDef.cardRef}</div>
            <div class="hand-display">${renderHandDisplay(rec.handDef.id, rec)}</div>
            <div class="tiles-matched" style="margin-bottom:6px">${n3AdjustedMatched} / ${totalTiles} tiles</div>
            ${youHave ? `<div class="yhave-chips">${youHave}</div>` : ''}
          </div>`;
        cardsDiv.appendChild(card);
      });

      btn.onclick = () => {
        const showing = cardsDiv.style.display !== 'none';
        cardsDiv.style.display = showing ? 'none' : 'block';
        btn.textContent = showing ? 'Show next 3 hands' : 'Hide';
      };

      next5Container.appendChild(btn);
      next5Container.appendChild(cardsDiv);
    }
  }

  // ── DISCARD RECOMMENDATIONS ───────────────────────────────
  const discards = getDiscardRecommendations([], top3, pivots, next5, hand);
  const discardReasons = [
    'Least useful across top hands',
    'Does not support your primary path',
    'Low value — does not fit top hands',
  ];
  const discardInner = discards.length > 0
    ? discards.slice(0,3).map((d,i)=>`
        <div class="discard-row">
          <span class="discard-tile">${d}</span>
          <span class="discard-reason">${discardReasons[i]||'Low priority tile'}</span>
        </div>`).join('')
    : `<div class="discard-fallback">No obvious dead weight — every tile supports at least one top hand.${hand.jokers>0?' Hold your joker(s).':''}</div>`;

  const discardCardEl = document.createElement('div');
  discardCardEl.innerHTML = `
    <div class="section-head">Discard Recommendations</div>
    <button class="show-more-btn" id="discardToggleBtn" onclick="
      const c=document.getElementById('discardContent');
      const showing=c.style.display!=='none';
      c.style.display=showing?'none':'block';
      this.textContent=showing?'Show Discard Recommendations':'Hide';
    ">Show Discard Recommendations</button>
    <div id="discardContent" style="display:none">
      <div class="discard-card">${discardInner}</div>
    </div>`;
  document.getElementById('discardCard').innerHTML = '';
  document.getElementById('discardCard').appendChild(discardCardEl);

  // ── POTENTIAL PIVOT HANDS ─────────────────────────────────
  const pivotContainer = document.getElementById('pivotContainer');
  pivotContainer.innerHTML = '';
  if (pivots.length > 0) {
    const pivotHTML = pivots.map(rec=>{
      const youHave = buildYouHaveChips(rec, hand);
      const totalTiles = rec.handDef.groups.reduce((s,g)=>s+(g.groupType==='quint'?5:g.groupType==='kong'?4:g.groupType==='pung'?3:g.groupType==='pair'?2:1),0);
      return `
      <div class="pivot-card">
        <div class="pivot-hdr">
          <span class="pivot-ref">${rec.handDef.cardRef}</span>
          <span class="pts-badge">${rec.matched} / ${totalTiles} tiles</span>
        </div>
        <div class="pivot-sec">${formatSectionName(rec.handDef.section)}</div>
        <div class="hand-display">${renderHandDisplay(rec.handDef.id, rec)}</div>
        ${youHave ? `<div class="yhave-chips" style="margin:6px 0">${youHave}</div>` : ''}
        <div class="pivot-trig">${pivotTriggerText(rec)}${rec.handDef.concealed?' Concealed hand.':''}</div>
      </div>`;
    }).join('');

    pivotContainer.innerHTML = `
      <div class="section-head">Potential Pivot Hands</div>
      <button class="show-more-btn" onclick="
        const c=document.getElementById('pivotContent');
        const showing=c.style.display!=='none';
        c.style.display=showing?'none':'block';
        this.textContent=showing?'Show Potential Pivot Hands':'Hide';
      ">Show Potential Pivot Hands</button>
      <div id="pivotContent" style="display:none">${pivotHTML}</div>`;
  }

  // ── FINALIZE ──────────────────────────────────────────────
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('resultsContent').style.display = 'block';

  // Selected tiles strip at top of results
  const _stripEl = document.createElement('div');
  _stripEl.className = 'results-hand-strip';
  const _chipEntries = [];
  ['BAM','CRK','DOT'].forEach(suit => {
    for (let n=1;n<=9;n++) {
      const id=`${suit}_${n}`, c=selectedTiles[id]||0;
      for (let i=0;i<c;i++) _chipEntries.push({cls:suit.toLowerCase(),label:`${n}${suit[0]}`});
    }
  });
  ['NORTH','EAST','WEST','SOUTH'].forEach(w=>{
    const c=selectedTiles[w]||0;
    for(let i=0;i<c;i++) _chipEntries.push({cls:'wind',label:w[0]});
  });
  ['GREEN','RED','WHITE'].forEach(d=>{
    const c=selectedTiles[d]||0;
    for(let i=0;i<c;i++) _chipEntries.push({cls:'dragon',label:d==='WHITE'?'Soap':d[0]+'D'});
  });
  for(let i=0;i<(selectedTiles['FLOWER']||0);i++) _chipEntries.push({cls:'flower',label:'F'});
  for(let i=0;i<(selectedTiles['JOKER']||0);i++)  _chipEntries.push({cls:'joker', label:'★'});
  _chipEntries.forEach(({cls,label})=>{
    const ch=document.createElement('div');
    ch.className=`tile-chip ${cls}`;
    ch.style.cursor='default';
    ch.textContent=label;
    _stripEl.appendChild(ch);
  });
  const _rc = document.getElementById('resultsContent');
  if (_rc) {
    const _old = _rc.querySelector('.results-hand-strip');
    if (_old) _old.remove();
    _rc.prepend(_stripEl);
  }
}


// ============================================================
// MAIN ANALYZE FUNCTION
// ============================================================

function analyze() {
  const total = getTotalCount();
  if (total<13||total>14) return;

  document.getElementById('selectScreen').classList.remove('active');
  document.getElementById('resultsScreen').classList.add('active');
  document.getElementById('loadingMsg').style.display='block';
  document.getElementById('resultsContent').style.display='none';

  setTimeout(()=>{
    const hand  = analyzeHand();
    const is14  = total===14;

    const allScores = [];
    for (const handDef of HAND_LIBRARY) {
      const best = findBestScore(handDef, hand);
      if (best) allScores.push(best);
    }
    allScores.sort((a,b)=>b.finalScore-a.finalScore);

    const top3     = allScores.slice(0,3);
    const threshold= (top3[2]?.finalScore||0)*0.75;
    const pivots   = allScores.slice(3)
      .filter(h=>h.finalScore>=Math.max(threshold,10))
      .filter(h=>h.matched>=4)
      .sort((a,b)=>b.matched-a.matched||b.finalScore-a.finalScore)
      .slice(0,3);

    try {
      renderResults(hand, top3, pivots, allScores, is14);
    } catch(e) {
      document.getElementById('loadingMsg').textContent = 'Error: ' + e.message;
      document.getElementById('loadingMsg').style.display = 'block';
      console.error('renderResults error:', e);
    }
  },400);
}

function resetApp() {
  // Clear tile selection state
  Object.keys(selectedTiles).forEach(k=>delete selectedTiles[k]);
  // Clear all results DOM so old hand never persists
  const rc = document.getElementById('resultsContent');
  if (rc) rc.innerHTML = '<div id="sectionFocus"></div><div id="top3Container"></div><div id="next5Container"></div><div id="discardCard"></div><div id="pivotContainer"></div><div id="glanceCard"></div>';
  const eb = document.getElementById('eastBanner');
  if (eb) eb.innerHTML = '';
  const lm = document.getElementById('loadingMsg');
  if (lm) { lm.style.display = 'block'; lm.textContent = 'Analyzing...'; }
  document.getElementById('resultsScreen').classList.remove('active');
  document.getElementById('selectScreen').classList.add('active');
  updateUI();
}

function editHand() {
  document.getElementById('resultsScreen').classList.remove('active');
  document.getElementById('selectScreen').classList.add('active');
}

updateUI();

</script>


<script>
  // ── Service worker registration (handles offline caching) ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }

  // ── Version check — works reliably on iPhone ──
  // Fetches /version.txt from Vercel on every app open.
  // If the number differs from what's stored locally, show the update banner.
  (function checkVersion() {
    const STORED_KEY = 'mahj_app_version';
    fetch('/version.txt?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.text())
      .then(remoteVersion => {
        remoteVersion = remoteVersion.trim();
        const localVersion = localStorage.getItem(STORED_KEY);
        if (!localVersion) {
          // First time — just store it, no banner
          localStorage.setItem(STORED_KEY, remoteVersion);
        } else if (localVersion !== remoteVersion) {
          // Version changed — show banner
          document.getElementById('updateBanner').style.display = 'block';
          // Store new version so reloading clears the banner
          localStorage.setItem(STORED_KEY, remoteVersion);
        }
      })
      .catch(() => {
        // Offline or fetch failed — silently do nothing
      });
  })();
</script>
